<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Background</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo { font-size: 1.1rem; font-weight: 800; color: #111; }
.logo span { color: #00c479; }

.hero {
  text-align: center;
  padding: 40px 16px 24px;
}
.hero h1 { font-size: 2rem; font-weight: 800; color: #111; margin-bottom: 10px; }
.hero p { color: #666; font-size: 1rem; max-width: 460px; margin: 0 auto; }

.drop-zone {
  width: 100%;
  max-width: 680px;
  margin: 0 16px 32px;
  background: #fff;
  border: 2px dashed #d0d0d0;
  border-radius: 20px;
  padding: 60px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: #00c479;
  background: #f0fff8;
}
.drop-zone input { display: none; }
.upload-icon { font-size: 3rem; margin-bottom: 16px; }
.drop-zone h2 { font-size: 1.2rem; font-weight: 700; color: #111; margin-bottom: 8px; }
.drop-zone p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
.btn-upload {
  background: #00c479;
  color: #fff;
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-upload:hover { background: #00a865; }
.formats { font-size: 0.78rem; color: #bbb; margin-top: 14px; }

.result-area {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 680px;
  padding: 0 16px 40px;
  gap: 20px;
}
.result-area.visible { display: flex; }

.slider-wrap {
  width: 100%;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  position: relative;
  user-select: none;
}
.slider-inner {
  position: relative;
  width: 100%;
  height: 380px;
  overflow: hidden;
  cursor: col-resize;
}
.img-after {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 0 0 / 20px 20px;
}
.img-before-wrap {
  position: absolute;
  top: 0; left: 0;
  height: 100%;
  overflow: hidden;
  width: 50%;
}
.img-before {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: #f0f0f0;
  min-width: 680px;
}
.slider-handle {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 100%;
  background: #fff;
  box-shadow: 0 0 8px rgba(0,0,0,0.3);
  cursor: col-resize;
  z-index: 10;
}
.slider-handle::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 36px;
  height: 36px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.slider-handle::after {
  content: '◀ ▶';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.55rem;
  color: #888;
  white-space: nowrap;
  letter-spacing: 2px;
}
.label-before, .label-after {
  position: absolute;
  bottom: 12px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 50px;
  pointer-events: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.label-before { left: 12px; }
.label-after { right: 12px; }

.status-box {
  width: 100%;
  background: #fff;
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ccc;
  flex-shrink: 0;
}
.status-box.loading .status-dot { background: #f0a500; animation: pulse 1s infinite; }
.status-box.done .status-dot { background: #00c479; }
.status-box.error .status-dot { background: #e53935; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-msg { font-size: 0.88rem; color: #555; flex: 1; }
.progress-mini {
  height: 3px;
  background: #eee;
  border-radius: 99px;
  overflow: hidden;
  width: 120px;
  flex-shrink: 0;
}
.progress-mini-bar {
  height: 100%;
  background: #00c479;
  border-radius: 99px;
  transition: width 0.3s;
  width: 0%;
}

.actions { display: flex; gap: 12px; width: 100%; }
.btn-dl {
  flex: 1;
  background: #00c479;
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 50px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s;
  display: none;
}
.btn-dl:hover { background: #00a865; }
.btn-dl.visible { display: block; }
.btn-new {
  flex: 0 0 auto;
  background: #fff;
  color: #555;
  border: 1.5px solid #ddd;
  padding: 14px 22px;
  border-radius: 50px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  display: none;
}
.btn-new:hover { border-color: #999; color: #111; }
.btn-new.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">remove<span>.bg</span> <span style="font-size:0.7rem;color:#999;font-weight:400;">— local</span></div>
</header>

<div class="hero">
  <h1>Supprimer le fond d'une image</h1>
  <p>100 % automatique · IA locale · Export PNG transparent</p>
</div>

<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" accept="image/*">
  <div class="upload-icon">🖼️</div>
  <h2>Glissez une image ici</h2>
  <p>ou importez depuis votre appareil</p>
  <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Importer une image</button>
  <div class="formats">JPG, PNG, WebP — jusqu'à 25 Mo</div>
</div>

<div class="result-area" id="resultArea">
  <div class="slider-wrap">
    <div class="slider-inner" id="sliderInner">
      <img class="img-after" id="imgAfter" src="" alt="résultat">
      <div class="img-before-wrap" id="beforeWrap">
        <img class="img-before" id="imgBefore" src="" alt="original">
      </div>
      <div class="slider-handle" id="sliderHandle"></div>
      <div class="label-before">Avant</div>
      <div class="label-after">Après</div>
    </div>
  </div>

  <div class="status-box" id="statusBox">
    <div class="status-dot"></div>
    <span class="status-msg" id="statusMsg">Chargement du modèle IA…</span>
    <div class="progress-mini" id="progressMini">
      <div class="progress-mini-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-dl" id="btnDl">⬇ Télécharger le PNG</button>
    <button class="btn-new" id="btnNew">↩ Nouvelle image</button>
  </div>
</div>

<script type="module">
import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const resultArea = document.getElementById('resultArea');
const imgAfter = document.getElementById('imgAfter');
const imgBefore = document.getElementById('imgBefore');
const beforeWrap = document.getElementById('beforeWrap');
const sliderHandle = document.getElementById('sliderHandle');
const sliderInner = document.getElementById('sliderInner');
const statusBox = document.getElementById('statusBox');
const statusMsg = document.getElementById('statusMsg');
const progressBar = document.getElementById('progressBar');
const progressMini = document.getElementById('progressMini');
const btnDl = document.getElementById('btnDl');
const btnNew = document.getElementById('btnNew');

let resultBlob = null, fileName = 'image', dragging = false;

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

async function processFile(file) {
  fileName = file.name.replace(/\.[^.]+$/, '');
  const url = URL.createObjectURL(file);
  imgBefore.src = url;
  imgAfter.src = '';
  resultBlob = null;
  btnDl.classList.remove('visible');
  btnNew.classList.remove('visible');
  dropZone.style.display = 'none';
  resultArea.classList.add('visible');
  progressMini.style.display = '';
  setSlider(50);
  setStatus('loading', 'Chargement du modèle IA…', 0);

  try {
    const blob = await removeBackground(url, {
      progress: (key, cur, total) => {
        const pct = total > 0 ? Math.round((cur/total)*100) : 0;
        progressBar.style.width = pct + '%';
        if (key === 'compute:inference') setStatus('loading', `Traitement IA… ${pct}%`, pct);
        else if (key.startsWith('fetch')) setStatus('loading', `Téléchargement modèle… ${pct}%`, pct);
      }
    });
    resultBlob = blob;
    imgAfter.src = URL.createObjectURL(blob);
    progressBar.style.width = '100%';
    setStatus('done', 'Fond supprimé avec succès ✓', 100);
    progressMini.style.display = 'none';
    btnDl.classList.add('visible');
    btnNew.classList.add('visible');
  } catch(e) {
    setStatus('error', 'Erreur : ' + (e.message || 'traitement échoué'), 0);
    btnNew.classList.add('visible');
  }
}

function setStatus(type, msg, pct) {
  statusBox.className = 'status-box ' + type;
  statusMsg.textContent = msg;
  progressBar.style.width = pct + '%';
}

function setSlider(pct) {
  const w = sliderInner.offsetWidth;
  const px = (pct / 100) * w;
  beforeWrap.style.width = px + 'px';
  sliderHandle.style.left = px + 'px';
}

sliderInner.addEventListener('mousedown', e => { dragging = true; move(e.clientX); });
sliderInner.addEventListener('touchstart', e => { dragging = true; move(e.touches[0].clientX); }, {passive:true});
window.addEventListener('mousemove', e => { if (dragging) move(e.clientX); });
window.addEventListener('touchmove', e => { if (dragging) move(e.touches[0].clientX); }, {passive:true});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('touchend', () => dragging = false);

function move(clientX) {
  const rect = sliderInner.getBoundingClientRect();
  let x = Math.max(0, Math.min(clientX - rect.left, rect.width));
  setSlider((x / rect.width) * 100);
}

btnDl.addEventListener('click', () => {
  if (!resultBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = fileName + '_sans-fond.png';
  a.click();
});

btnNew.addEventListener('click', () => {
  dropZone.style.display = '';
  resultArea.classList.remove('visible');
  progressMini.style.display = '';
  progressBar.style.width = '0%';
  btnDl.classList.remove('visible');
  btnNew.classList.remove('visible');
  fileInput.value = '';
  resultBlob = null;
});
</script>
</body>
</html>
